<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet per il "bene pubblico"</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Qui c'è l'intestazione con il logo ed il titolo -->
    <header>
      <div id="pattern">
        <div id="logo"></div>
      </div>
      <h1>Internet deve essere al servizio del "bene pubblico": il manifesto di Tim Berners-Lee</h1>
    </header>
    <main>
        <section class="writtenby">
            <p>Scritto da <span id="azzurro">The Booleaner</span> il 10/10/2020</p>
        </section>
        <section>
            <figure>
                <img src="./img-booleaner/tim-1.jpg" alt="Immagine di Tim Berners-Lee">
                <img src="./img-booleaner/tim-2.jpg" alt="Seconda immagine di Tim Berners-Lee">
                <figcaption>1st photo: John.S and James L. Knight Foundation, by Scott Henricksen</figcaption>
                <figcaption>2nd photo: Wikimedia by Paul Clarke</figcaption>
            </figure>
        </section>
    </main>
    <footer></footer>
</body>
</html>
